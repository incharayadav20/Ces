<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>City Emergency Services - Trial Sheet</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #8e44ad, #d199ff);
            --text-color: #ffffff;
            --hover-row: rgba(255, 255, 255, 0.15);
            --column-highlight: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            background-color: #f4f4f4;
            font-family: 'Times New Roman', serif;
            min-height: 100vh;
            padding-bottom: 60px; /* Space for fixed footer */
        }

        header {
            background-color: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .menu {
            background: #111;
            text-align: center;
            padding: 10px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .menu a {
            color: white;
            margin: 0 20px;
            text-decoration: none;
            font-size: 20px;
            padding: 5px 15px;
            transition: 0.3s;
            display: inline-block;
        }

        .menu a:hover {
            background-color: #6cf3e3;
            color: #333;
            border-radius: 5px;
        }

        /* --- STYLED TABLE SECTION --- */
        .table-wrapper {
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }

        .table-container {
            background: var(--bg-gradient);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 800px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: white;
            font-size: 18px;
            position: relative;
            z-index: 1;
        }

        th, td {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        th {
            background: rgba(0, 0, 0, 0.1);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
        }

        /* Crosshair Effect - Row */
        tbody tr:hover {
            background-color: var(--hover-row);
        }

        /* Crosshair Effect - Column */
        td:hover::after, th:hover::after {
            content: "";
            position: absolute;
            background-color: var(--column-highlight);
            left: 0;
            right: 0;
            top: -5000px;
            bottom: -5000px;
            z-index: -1;
        }

        /* Active cell brightness */
        td:hover {
            background-color: rgba(255, 255, 255, 0.3) !important;
            cursor: pointer;
        }

        footer {
            background-color: #333;
            color: white;
            padding: 10px;
            text-align: center;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
