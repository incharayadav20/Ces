<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>City Emergency Services</title>

<style>

body{
margin:0;
font-family:'Times New Roman',serif;
min-height:100vh;
display:flex;
flex-direction:column;
background:linear-gradient(to right,#8e44ad,#3498db);
}

header{
background:#cb4e4e;
color:white;
text-align:center;
padding:20px;
font-size:45px;
}

.menu{
background:#111;
text-align:center;
padding:12px;
position:sticky;
top:0;
}

.menu a{
color:white;
text-decoration:none;
margin:0 25px;
font-size:18px;
padding:6px 15px;
}

.menu a:hover{
background:#6cf3e3;
color:#000;
border-radius:5px;
}

.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
width:380px;
padding:40px;
background:linear-gradient(to right,#7fd3ff,#46c0c8);
border-radius:80px 0 0 0;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
margin-bottom:40px;
}

.login-box h2{
color:white;
font-size:30px;
margin-bottom:30px;
}

.login-box input[type="text"],
.login-box input[type="password"]{
width:80%;
padding:12px;
margin:10px 0;
border:2px solid #333;
border-radius:25px;
outline:none;
font-size:16px;
}

.options{
display:flex;
justify-content:space-between;
align-items:center;
margin:20px 40px;
font-size:14px;
}

.remember{
display:flex;
align-items:center;
gap:8px;
}

.remember input{
width:auto;
margin:0;
padding:0;
border:none;
}

.options a{
text-decoration:none;
color:#003366;
}

.login-btn{
margin-top:25px;
padding:12px 45px;
background:#222;
color:#5aa6ff;
border:none;
border-radius:30px;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.login-btn:hover{
background:black;
color:white;
}

.register{
margin-top:20px;
font-size:13px;
}

footer{
background:#333;
color:white;
text-align:center;
padding:10px;
position:fixed;
bottom:0;
width:100%;
}

</style>
</head>

<body>

<header>
City Emergency Services
</header>

<div class="menu">
<a href="#">Home</a>
<a href="index.html">Registration</a>
<a href="trial.html">Table</a>
<a href="#">Services</a>
<a href="login.html">Login</a>
</div>

<div class="main">

<div class="login-box">

<h2>Sign In</h2>

<input type="text" placeholder="Username">
<input type="password" placeholder="Password">

<div class="options">

<label class="remember">
<input type="checkbox"> Remember me
</label>

<a href="#">Forgot Password</a>

</div>

<button class="login-btn">LOGIN</button>

<p class="register">
Don't have an account? Register here
</p>

</div>

</div>

    <footer>
        <marquee behavior="scroll" direction="left">
            &copy; 2026 City Emergency Services | Ambulance | Fire | Police | Emergency Help 24/7
        </marquee>
    </footer>

</body>
</html>
